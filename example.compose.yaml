name: cmdman-compose-example

# Demonstrates cmdman compose: independent commands run concurrently, ${VAR}
# interpolation, and dependency-ordered (topologically sorted) startup via `after`.
commands:
  # yay1: the simplest command — just prints.
  yay1:
    args:
      - echo
      - yay

  # yay2: demonstrates interpolation from env — the env: block defines SLEEP_SECS
  # (itself defaulting via ${INPUT_SLEEP:-3}), and args interpolate ${SLEEP_SECS}.
  # It sleeps ~3s so dependents must wait for it to complete.
  yay2:
    env:
      - SLEEP_SECS=${INPUT_SLEEP:-3}
    args:
      - sleep
      - ${SLEEP_SECS}

  # nay: depends on BOTH yay1 and yay2. Topological ordering puts nay in a later
  # layer, so it starts only after both complete — waiting ~3s for yay2's sleep.
  nay:
    args:
      - echo
      - nay
    after:
      yay1:
        condition: completed
      yay2:
        condition: completed

  # web: scaled to 3 replicas. Each replica is a distinct cmdman command named
  # "<base>-1".."<base>-3"; cmdman injects CMDMAN_COMPOSE_SCALE_INDEX (this
  # replica's 1-based index) and CMDMAN_COMPOSE_SCALE (the total) into each one.
  # Note the $$ — it escapes interpolation so the variable reaches the shell at
  # run time instead of being substituted (to blank) while loading the file.
  # Change the count live with `cmdman compose scale web=5`.
  web:
    scale: 3
    args:
      - sh
      - -c
      - echo "replica $${CMDMAN_COMPOSE_SCALE_INDEX} of $${CMDMAN_COMPOSE_SCALE}"

# mux: a leaf may pin a replica with scale: <n>; an unpinned leaf cycles through
# the command's replicas on successive `cmdman compose mux` invocations.
mux:
  layouts:
    - name: web
      root:
        dir: h
        splits: [1, 1]
        panes:
          - command: web
            scale: 1   # always shows replica web-1
          - command: web   # unpinned: cycles web-1 → web-2 → web-3
