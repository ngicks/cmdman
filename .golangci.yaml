version: "2"
linters:
  default: none
  enable:
    - govet
    # unused assign
    - ineffassign
    - staticcheck
    # unused var
    - unused
    # modernize
    - modernize
    # dangerous unicode check
    - bidichk
    # check a := a in loop
    - copyloopvar
    - gocritic
    - lll
  settings:
    gocritic:
      disable-all: true
      enabled-checks:
        - appendAssign
        - appendCombine
        - badCall
        - badCond
    lll:
      # Max line length, lines longer will be reported.
      # '\t' is counted as 1 character by default, and can be changed with the tab-width option.
      # Default: 120.
      line-length: 100
      # Tab width in spaces.
      # Default: 1
      tab-width: 2
formatters:
  enable:
    - goimports
    - golines
  settings:
    golines:
      # Shorten single-line comments.
      # Default: false
      shorten-comments: true
      # Default: true
      reformat-tags: false
